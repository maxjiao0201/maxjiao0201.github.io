<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通关</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f0f8ff;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .main-text {
      font-size: 2.5rem;
      color: #007bff;
      text-align: center;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0, 123, 255, 0.3);
    }

    .message {
      text-align: center;
      max-width: 500px;
      line-height: 1.8;
      color: #666;
      margin-bottom: 40px;
    }

    .message .note {
      color: #007bff;
      font-size: 1.1rem;
      display: block;
      margin-bottom: 20px;
    }

    .divider {
      width: 100px;
      height: 2px;
      background: #007bff;
      margin: 30px auto;
    }

    .disclaimer {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-top: 40px;
      line-height: 1.8;
    }

    .copyright {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="main-text">恭喜通关</div>

  <div class="message">
    <span class="note">其实日记的最后一页的那个字是我写错了，sorry~</span>
    如果你喜欢这个解密，请将它分享吧
  </div>

  <div class="divider"></div>

  <div class="disclaimer">
    本网页的所有内容均为虚构<br>
    如有雷同纯属巧合
  </div>

  <div class="copyright">
    Copyright© jiaojiao. All Rights Reserved.
  </div>
</body>
</html>
