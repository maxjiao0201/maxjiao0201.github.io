<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日记</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #8b0000;
      font-family: '宋体', 'SimSun', serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 30px;
      color: #cc0000;
      text-shadow: 0 0 10px #ff0000;
    }

    .content {
      font-size: 1.1rem;
      line-height: 2;
      white-space: pre-wrap;
    }

    .step {
      margin: 30px 0;
      padding: 20px;
      border: 1px dashed #440000;
      background: rgba(139, 0, 0, 0.1);
    }

    .step-num {
      color: #ff0000;
      font-size: 1.3rem;
      margin-bottom: 10px;
      text-shadow: 0 0 8px #ff0000;
    }

    .warning {
      color: #ff0000;
      text-align: center;
      margin-top: 40px;
      font-size: 0.9rem;
      animation: blink 2s step-end infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">仪式的步骤</div>
    <div class="content">
      <div class="step">
        <div class="step-num">第一步</div>
        将这些人的名字写在纸上，用红笔划掉，然后烧掉。
      </div>

      <div class="step">
        <div class="step-num">第二步</div>
        在与他们相关的帖子里输入要报复之人的名字。
      </div>

      <div class="step">
        <div class="step-num">第三步</div>
        等待。
      </div>
    </div>

    <div class="warning">
      没有人能逃脱。
    </div>
  </div>
</body>
</html>
